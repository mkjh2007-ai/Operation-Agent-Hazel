<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASE FILES</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;600;700&display=swap)" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/ui.css">
</head>
<body>
    <!-- Main Game Container -->
    <div id="game-container">
        
        <!-- Boot Sequence -->
        <div id="boot-screen" class="screen active">
            <div class="led-indicator"></div>
            <div class="boot-text"></div>
            <div class="scanner"></div>
        </div>
        
        <!-- CRT Chief Screen -->
        <div id="chief-screen" class="screen">
            <div class="crt-overlay"></div>
            <div class="crt-scanlines"></div>
            <div class="chief-container">
                <div class="chief-silhouette"></div>
                <div class="chief-glitch"></div>
            </div>
            <div class="dialogue-box">
                <div class="dialogue-text"></div>
                <div class="dialogue-continue">▼</div>
            </div>
            <div class="evidence-projection"></div>
        </div>
        
        <!-- Door Scene -->
        <div id="door-screen" class="screen">
            <div class="door-container">
                <div class="door">
                    <div class="door-panel"></div>
                    <div class="door-handle"></div>
                    <div class="door-peephole"></div>
                </div>
            </div>
            <div class="courier-container">
                <div class="courier"></div>
            </div>
            <div class="package-drop-zone"></div>
        </div>
        
        <!-- Package Opening -->
        <div id="package-screen" class="screen">
            <div class="desk-surface"></div>
            <div class="package" draggable="true"></div>
            <div class="package-contents"></div>
        </div>
        
        <!-- Mission Stamp -->
        <div id="mission-screen" class="screen">
            <div class="mission-file">
                <div class="mission-header">CASE FILE</div>
                <div class="mission-number"></div>
                <div class="mission-title"></div>
                <div class="mission-location"></div>
                <div class="mission-stamp">CLASSIFIED</div>
            </div>
        </div>
        
        <!-- Main Investigation Screen -->
        <div id="investigation-screen" class="screen">
            <div class="location-backdrop"></div>
            <div class="location-overlay"></div>
            
            <!-- Interactive Elements Container -->
            <div class="interactive-layer"></div>
            
            <!-- Characters in Scene -->
            <div class="characters-layer"></div>
            
            <!-- Dialogue Overlay -->
            <div class="dialogue-overlay hidden">
                <div class="speaker-portrait"></div>
                <div class="speaker-name"></div>
                <div class="dialogue-content">
                    <div class="dialogue-text"></div>
                </div>
                <div class="dialogue-choices"></div>
            </div>
            
            <!-- Evidence Popup -->
            <div class="evidence-popup hidden">
                <div class="evidence-image"></div>
                <div class="evidence-description"></div>
                <button class="evidence-collect">Collect Evidence</button>
                <button class="evidence-close">×</button>
            </div>
        </div>
        
        <!-- Travel Sequence -->
        <div id="travel-screen" class="screen">
            <div class="travel-slideshow"></div>
            <div class="travel-info">
                <div class="travel-fact"></div>
                <div class="travel-destination"></div>
            </div>
            <div class="travel-progress"></div>
        </div>
        
        <!-- Detective Board -->
        <div id="board-screen" class="screen">
            <div class="cork-board">
                <div class="board-items"></div>
                <div class="board-strings"></div>
            </div>
            <button class="board-close">Return to Investigation</button>
        </div>
        
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="location-indicator">
                    <span class="location-icon">📍</span>
                    <span class="location-name"></span>
                </div>
            </div>
            <div class="hud-right">
                <button class="hud-btn" data-panel="phone" title="Phone">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </button>
                <button class="hud-btn" data-panel="notebook" title="Notebook">
                    <svg viewBox="0 0 24 24"><path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/></svg>
                </button>
                <button class="hud-btn" data-panel="evidence" title="Evidence">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
                </button>
                <button class="hud-btn" data-panel="people" title="People">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                </button>
                <button class="hud-btn" data-panel="board" title="Detective Board">
                    <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                </button>
                <button class="hud-btn" data-panel="map" title="Map">
                    <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5z"/></svg>
                </button>
            </div>
        </div>
        
        <!-- Side Panels -->
        <div id="phone-panel" class="side-panel hidden">
            <div class="panel-header">
                <h2>Phone</h2>
                <button class="panel-close">×</button>
            </div>
            <div class="panel-content">
                <div class="phone-screen">
                    <div class="phone-notifications"></div>
                    <div class="phone-call-incoming hidden">
                        <div class="caller-id"></div>
                        <div class="call-buttons">
                            <button class="call-answer">Answer</button>
                            <button class="call-ignore">Ignore</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="notebook-panel" class="side-panel hidden">
            <div class="panel-header">
                <h2>Notebook</h2>
                <button class="panel-close">×</button>
            </div>
            <div class="panel-content">
                <textarea class="notebook-textarea" placeholder="Write your notes here..."></textarea>
            </div>
        </div>
        
        <div id="evidence-panel" class="side-panel hidden">
            <div class="panel-header">
                <h2>Evidence</h2>
                <button class="panel-close">×</button>
            </div>
            <div class="panel-content">
                <div class="evidence-grid"></div>
            </div>
        </div>
        
        <div id="people-panel" class="side-panel hidden">
            <div class="panel-header">
                <h2>People</h2>
                <button class="panel-close">×</button>
            </div>
            <div class="panel-content">
                <div class="people-list"></div>
            </div>
        </div>
        
        <div id="map-panel" class="side-panel hidden">
            <div class="panel-header">
                <h2>Map</h2>
                <button class="panel-close">×</button>
            </div>
            <div class="panel-content">
                <div class="map-container">
                    <div class="map-locations"></div>
                </div>
            </div>
        </div>
        
        <!-- Custom Cursor -->
        <div id="custom-cursor">
            <div class="cursor-default"></div>
            <div class="cursor-magnify hidden"></div>
            <div class="cursor-grab hidden"></div>
            <div class="cursor-talk hidden"></div>
            <div class="cursor-camera hidden"></div>
        </div>
        
    </div>
    
    <!-- Audio Elements -->
    <audio id="sfx-typewriter" preload="auto"></audio>
    <audio id="sfx-static" preload="auto"></audio>
    <audio id="sfx-doorbell" preload="auto"></audio>
    <audio id="sfx-paper" preload="auto"></audio>
    <audio id="bgm-main" preload="auto" loop></audio>
    
    <!-- Scripts -->
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/dialogue.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/travel.js"></script>
    <script src="js/scenes.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
